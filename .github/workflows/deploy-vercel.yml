#
# Deploy to Vercel — Builds and deploys to Vercel.
# Works for Express/Node.js APIs (api/index.ts) and Next.js apps.
# Called by deploy-router.yml when the active profile matches *-vercel.
#
# Prerequisites:
#   - VERCEL_TOKEN, VERCEL_ORG_ID secrets
#   - vercel.json in repo root
#

name: Deploy to Vercel

on:
  workflow_call:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: deploy-vercel
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci --ignore-scripts 2>/dev/null || npm install

      - name: Install Vercel CLI
        run: npm install -g vercel

      - name: Pull Vercel config
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
        run: vercel pull --yes --environment=production --token=$VERCEL_TOKEN

      - name: Build
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: vercel build --prod --token=$VERCEL_TOKEN

      - name: Deploy
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: |
          URL=$(vercel deploy --prebuilt --prod --token=$VERCEL_TOKEN)
          echo "Deployed to: $URL"
